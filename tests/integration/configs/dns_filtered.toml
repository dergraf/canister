# DNS-filtered network mode — pasta with domain-based allowlist.
# Used by: t_dns_filtering.sh
#
# Uses `egress = "direct"` (not `proxy-only`) because this test exercises
# the supervisor's *direct* connect filter against the dynamic allow list
# populated from `allow_domains`. In `proxy-only` mode the supervisor
# unconditionally denies any non-proxy egress (see ADR-0006), so the
# dynamic allow list is never consulted.

[filesystem]
allow = ["/usr/lib", "/usr/bin", "/usr/local", "/lib", "/lib64", "/tmp"]

[network]
allow_domains = ["example.com", "httpbin.org"]
egress = "direct"

[process]
env_passthrough = ["PATH", "HOME", "LANG", "TERM"]

[syscalls]
