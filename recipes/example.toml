# Example Canister recipe — a complete sandbox policy for Python scripts.
#
# Usage: can run --recipe recipes/example.toml -- python3 script.py

[recipe]
name = "example"
description = "Example recipe showing all available options"
version = "1"

# Strict mode: abort if any isolation layer cannot be set up.
# Recommended for CI. Uncomment to enable.
# strict = true

[filesystem]
# Paths the sandboxed process can access.
allow = ["/usr/lib", "/usr/bin", "/lib", "/tmp/workspace"]
# Paths explicitly denied (checked before allow).
deny = ["/etc/shadow", "/root"]

[network]
# Whitelisted domains (resolved via internal DNS proxy).
allow_domains = ["pypi.org", "files.pythonhosted.org"]
# Whitelisted IPs or CIDRs.
allow_ips = []
# Default-deny all network access except listed above.
deny_all = true

[process]
# Max child PIDs.
max_pids = 64
# Executables the sandbox may exec.
allow_execve = ["/usr/bin/python3"]
# Environment variables passed through from host.
env_passthrough = ["PATH", "HOME", "LANG", "TERM"]

[resources]
# Memory limit in MB (enforced via cgroups v2).
memory_mb = 512
# CPU limit as percentage of one core (enforced via cgroups v2).
cpu_percent = 50

# [syscalls] section — customize the default seccomp baseline.
# Uncomment to add or remove specific syscalls:
# [syscalls]
# seccomp_mode = "allow-list"
# allow_extra = ["ptrace"]        # add ptrace to the allow list
# deny_extra = ["personality"]    # remove personality from allow, add to deny
