# To regenerate:
#   cd recipes && for f in *.toml; do [ "$f" != "checksums.toml" ] && \
#     echo "\"$f\" = \"$(sha256sum "$f" | cut -d' ' -f1)\""; done
#
# Use --no-verify to skip verification (e.g., for custom/forked repos).

