[tools]
rust = "1.93"

[tasks.build]
description = "Build all crates"
run = "cargo build --workspace"

[tasks.test]
description = "Run unit tests with cargo-nextest"
run = "cargo nextest run --workspace"

[tasks.test-std]
description = "Run unit tests with cargo test (fallback)"
run = "cargo test --workspace"

[tasks.integration-test]
description = "Run integration tests (requires built binary + Linux namespaces)"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail

TESTS_DIR="tests/integration"
PASSED=0
FAILED=0
SKIPPED=0
FAILURES=()

for test_file in "${TESTS_DIR}"/t_*.sh; do
    if bash "$test_file"; then
        (( PASSED++ )) || true
    else
        exit_code=$?
        if [[ $exit_code -eq 0 ]]; then
            (( SKIPPED++ )) || true
        else
            (( FAILED++ )) || true
            FAILURES+=("$(basename "$test_file")")
        fi
    fi
    echo ""
done

echo "============================================"
echo "Integration test summary"
echo "  Files: $((PASSED + FAILED + SKIPPED)) total"
echo "  Passed:  ${PASSED}"
echo "  Failed:  ${FAILED}"
echo "  Skipped: ${SKIPPED}"

if (( FAILED > 0 )); then
    echo ""
    echo "  Failed files:"
    for f in "${FAILURES[@]}"; do
        echo "    - $f"
    done
    echo "============================================"
    exit 1
fi
echo "============================================"
"""

[tasks.test-all]
description = "Run unit tests + integration tests"
depends = ["test", "integration-test"]

[tasks.lint]
description = "Run clippy lints"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all --check"

[tasks.fmt-fix]
description = "Fix formatting"
run = "cargo fmt --all"

[tasks.check]
description = "Type-check all crates"
run = "cargo check --workspace --all-targets"

[tasks.audit]
description = "Audit dependencies"
run = "cargo deny check"
