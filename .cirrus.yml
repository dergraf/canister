# Cirrus CI — Integration tests on real VMs with MAC enforcement.
#
# These tests run the full integration suite on VMs with real kernel
# features: user namespaces, mount namespaces, seccomp, cgroups v2,
# and MAC (AppArmor on Ubuntu, SELinux on Fedora).
#
# GitHub Actions handles: check, unit tests, MSRV, policy compile tests.
# Cirrus CI handles: integration tests requiring kernel-level access.
#
# Dashboard: https://cirrus-ci.com/github/dergraf/canister

env:
  CIRRUS_SHELL: "/bin/bash"
  CARGO_HOME: "/tmp/cargo"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Default timeout for each task.
timeout_in: 30m

# ---------------------------------------------------------------------------
# Integration tests on Ubuntu (AppArmor)
# ---------------------------------------------------------------------------
apparmor_integration_task:
  name: "Integration (Ubuntu + AppArmor)"
  alias: apparmor_integration
  compute_engine_instance:
    image_project: ubuntu-os-cloud
    image: family/ubuntu-2404-lts-amd64
    platform: linux
    cpu: 4
    memory: 8G
    disk: 50

  env:
    DEBIAN_FRONTEND: noninteractive

  install_deps_script:
    - apt-get update -qq
    - apt-get install -y -qq build-essential pkg-config passt apparmor-utils python3 git

  install_rust_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
    - source "$CARGO_HOME/bin/env"
    - rustup show

  cargo_cache:
    folder: "${CARGO_HOME}/registry"
    fingerprint_script:
      - uname -m
      - $CARGO_HOME/bin/rustc --version
      - cat Cargo.lock

  target_cache:
    folder: "target"
    fingerprint_script:
      - uname -m
      - $CARGO_HOME/bin/rustc --version
      - cat Cargo.lock

  build_script:
    - source "$CARGO_HOME/bin/env"
    - cargo build --workspace

  unit_test_script:
    - source "$CARGO_HOME/bin/env"
    - cargo test --workspace

  check_environment_script:
    - echo "--- Kernel ---"
    - uname -a
    - echo "--- AppArmor ---"
    - aa-status --verbose 2>/dev/null || echo "aa-status not available (expected if not root)"
    - cat /sys/module/apparmor/parameters/enabled || echo "AppArmor module parameter not found"
    - cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo "userns restriction sysctl not found"
    - echo "--- User namespaces ---"
    - cat /proc/sys/kernel/unprivileged_userns_clone 2>/dev/null || echo "sysctl not found (userns likely available)"
    - unshare --user true && echo "unshare --user works" || echo "unshare --user FAILED"
    - echo "--- pasta ---"
    - which pasta && pasta --version || echo "pasta not found"

  enable_userns_script:
    # Ubuntu 24.04+ restricts unprivileged user namespaces via AppArmor.
    # Relax this so the sandbox can create namespaces, then install our
    # AppArmor profile which explicitly grants the permission.
    - |
      if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
        echo "Relaxing AppArmor userns restriction for integration tests..."
        sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      fi

  sandbox_smoke_test_script:
    - source "$CARGO_HOME/bin/env"
    - ./target/debug/can check
    - ./target/debug/can run -- echo "sandbox works"

  setup_apparmor_policy_script:
    - source "$CARGO_HOME/bin/env"
    # Non-interactive: stdout is not a TTY in CI, so setup auto-confirms.
    - ./target/debug/can setup --force 2>&1
    - echo "--- AppArmor policy installed ---"
    - aa-status 2>/dev/null | grep -i canister || echo "canister profile not visible in aa-status (may need root)"

  integration_test_script:
    - source "$CARGO_HOME/bin/env"
    - ./tests/integration/run.sh

  # Run MAC test explicitly for better CI visibility. The test also runs as
  # part of run.sh above, but having it as a separate script step makes
  # failures immediately visible in the Cirrus CI task log.
  mac_integration_test_script:
    - source "$CARGO_HOME/bin/env"
    - bash ./tests/integration/t_apparmor.sh

# ---------------------------------------------------------------------------
# Integration tests on Fedora (SELinux)
# ---------------------------------------------------------------------------
selinux_integration_task:
  name: "Integration (Fedora + SELinux)"
  alias: selinux_integration
  compute_engine_instance:
    image_project: fedora-cloud
    image: family/fedora-cloud-41
    platform: linux
    cpu: 4
    memory: 8G
    disk: 50

  install_deps_script:
    - dnf install -y gcc pkg-config passt selinux-policy-devel policycoreutils python3 git

  install_rust_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
    - source "$CARGO_HOME/bin/env"
    - rustup show

  cargo_cache:
    folder: "${CARGO_HOME}/registry"
    fingerprint_script:
      - uname -m
      - $CARGO_HOME/bin/rustc --version
      - cat Cargo.lock

  target_cache:
    folder: "target"
    fingerprint_script:
      - uname -m
      - $CARGO_HOME/bin/rustc --version
      - cat Cargo.lock

  build_script:
    - source "$CARGO_HOME/bin/env"
    - cargo build --workspace

  unit_test_script:
    - source "$CARGO_HOME/bin/env"
    - cargo test --workspace

  check_environment_script:
    - echo "--- Kernel ---"
    - uname -a
    - echo "--- SELinux ---"
    - getenforce
    - sestatus
    - echo "--- User namespaces ---"
    - cat /proc/sys/user/max_user_namespaces 2>/dev/null || true
    - unshare --user true && echo "unshare --user works" || echo "unshare --user FAILED (may need SELinux policy)"
    - echo "--- pasta ---"
    - which pasta && pasta --version || echo "pasta not found"

  sandbox_smoke_test_script:
    - source "$CARGO_HOME/bin/env"
    - ./target/debug/can check
    # On Fedora 41+ with SELinux restricting userns, this may fail until
    # we install the policy. That's expected — the test below handles it.
    - ./target/debug/can run -- echo "sandbox works" || echo "::notice::Sandbox smoke test failed (expected before SELinux policy install)"

  setup_selinux_policy_script:
    - source "$CARGO_HOME/bin/env"
    # Non-interactive: stdout is not a TTY in CI, so setup auto-confirms.
    - ./target/debug/can setup --force 2>&1
    - echo "--- SELinux policy installed ---"
    - semodule -l | grep canister || echo "canister module not visible"
    - echo "--- Verify sandbox works after policy install ---"
    - ./target/debug/can run -- echo "sandbox works after policy install"

  integration_test_script:
    - source "$CARGO_HOME/bin/env"
    - ./tests/integration/run.sh

  # Run MAC test explicitly for better CI visibility (see above).
  mac_integration_test_script:
    - source "$CARGO_HOME/bin/env"
    - bash ./tests/integration/t_selinux.sh

# ---------------------------------------------------------------------------
# Status aggregator — single check for merge gating.
# ---------------------------------------------------------------------------
success_task:
  name: "Integration Success"
  alias: success
  depends_on:
    - apparmor_integration
    - selinux_integration
  container:
    image: alpine:3.21
    cpu: 1
    memory: 512M
  clone_script: mkdir -p "$CIRRUS_WORKING_DIR"
  script: echo "All integration tests passed."
