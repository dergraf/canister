# GitHub Actions CI — check, unit tests, MSRV, policy compile tests,
# and integration tests on real VMs (QEMU/KVM) with MAC enforcement.
#
# Integration tests boot Fedora (SELinux) and Ubuntu (AppArmor) cloud
# images in QEMU with KVM acceleration on the GHA runner, SCP the
# pre-built binary in, and run the full integration suite.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Static analysis and unit tests
  # -----------------------------------------------------------------------
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: check-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Guard ignored tests metadata
        run: ./ci/check_ignored_tests.sh

      - name: Guard against unannotated unwrap/expect/panic
        run: ./ci/check_unwraps.sh

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck integration scripts
        # Only fail on `error`-severity findings. Warnings (SC2034 unused
        # exported vars consumed by `source`d test files, SC2024 sudo
        # redirects in t_apparmor.sh, etc.) are intentional and stay as
        # advisory output rather than blocking gates.
        run: shellcheck -S error -x -P tests/integration tests/integration/*.sh ci/*.sh

      - name: Install cargo-audit
        run: cargo install --quiet cargo-audit --locked

      - name: Cargo audit (advisory check)
        run: cargo audit --deny warnings || echo "::warning::cargo audit reported findings"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-

      - name: Unit tests
        run: cargo test --workspace

      - name: Install passt
        run: sudo apt-get update && sudo apt-get install -y passt

      - name: Check sandbox support
        id: sandbox-check
        run: |
          cargo build --workspace --quiet
          if ./target/debug/can run -- true 2>/dev/null; then
            echo "sandbox=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Sandbox not functional on this runner (likely restricted namespaces) — skipping integration tests"
            echo "sandbox=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration tests
        if: steps.sandbox-check.outputs.sandbox == 'true'
        run: ./tests/integration/run.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          rustup show
          rustup component add llvm-tools-preview

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: coverage-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: coverage-${{ runner.os }}-

      - name: Install cargo-llvm-cov
        run: cargo install --quiet cargo-llvm-cov --locked

      - name: Run coverage
        # Threshold is enforced inside ci/coverage.sh (default 65%, override
        # via $COVERAGE_THRESHOLD). The script also writes the lcov artifact
        # so the post-job upload-artifact step picks it up.
        run: ./ci/coverage.sh --lcov lcov.info

      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        run: |
          rustup toolchain install 1.85 --profile minimal
          rustup default 1.85

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: msrv-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: msrv-${{ runner.os }}-

      - name: Check MSRV
        run: cargo check --workspace

  # -----------------------------------------------------------------------
  # MAC policy compile tests (container-based, no kernel needed)
  # -----------------------------------------------------------------------
  selinux-compile-test:
    name: SELinux Policy Compile Test
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - uses: actions/checkout@v4

      - name: Install SELinux tools
        run: dnf install -y checkpolicy policycoreutils selinux-policy-devel make python3

      - name: Install Rust toolchain
        run: |
          dnf install -y gcc curl
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: selinux-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: selinux-${{ runner.os }}-

      - name: Build and run SELinux unit tests
        run: |
          source "$HOME/.cargo/env"
          cargo build --workspace --quiet
          cargo test -p can-sandbox -- mac::selinux --quiet

      - name: Generate and compile SELinux policy
        run: |
          source "$HOME/.cargo/env"
          BIN_PATH=$(realpath target/debug/can)

          # Extract the policy templates from the Rust source using python.
          mkdir -p /tmp/selinux-build
          python3 -c "
          import re
          src = open('crates/can-sandbox/src/mac/selinux.rs').read()
          te_match = re.search(r\"const TE_TEMPLATE:.*?= r#\\\"(.*?)\\\"#;\", src, re.DOTALL)
          fc_match = re.search(r\"const FC_TEMPLATE:.*?= r#\\\"(.*?)\\\"#;\", src, re.DOTALL)
          if_match = re.search(r\"const IF_TEMPLATE:.*?= r#\\\"(.*?)\\\"#;\", src, re.DOTALL)
          if te_match:
              te = te_match.group(1).replace('{bin_path}', '$BIN_PATH')
              open('/tmp/selinux-build/canister.te', 'w').write(te)
          if fc_match:
              fc = fc_match.group(1).replace('{bin_path}', '${BIN_PATH}'.replace('.', r'\.'))
              open('/tmp/selinux-build/canister.fc', 'w').write(fc)
          if if_match:
              open('/tmp/selinux-build/canister.if', 'w').write(if_match.group(1))
          "

          if [ ! -f /tmp/selinux-build/canister.te ]; then
            echo "::error::Could not extract TE template from source"
            exit 1
          fi

          echo "--- Generated TE policy ---"
          cat /tmp/selinux-build/canister.te
          echo "--- End TE policy ---"

          # Build using the reference policy Makefile (same as `can setup` uses).
          echo "--- Building with reference policy Makefile ---"
          cd /tmp/selinux-build
          make -f /usr/share/selinux/devel/Makefile canister.pp
          echo "Reference policy build: SUCCESS"
          ls -la canister.pp

  apparmor-compile-test:
    name: AppArmor Profile Compile Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: apparmor-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: apparmor-${{ runner.os }}-

      - name: Build and run AppArmor unit tests
        run: cargo test -p can-sandbox -- mac::apparmor --quiet

      - name: Generate and verify AppArmor profile
        run: |
          cargo build --workspace --quiet
          BIN_PATH=$(realpath target/debug/can)

          # Extract and generate the AppArmor profile.
          python3 -c "
          import re
          src = open('crates/can-sandbox/src/mac/apparmor.rs').read()
          match = re.search(r'const PROFILE_TEMPLATE:.*?= r#\"(.*?)\"#;', src, re.DOTALL)
          if match:
              profile = match.group(1).replace('{bin_path}', '$BIN_PATH')
              # Generate standard pasta ux rules (same paths as STANDARD_PASTA_PATHS).
              pasta_rules = '\n'.join([
                  '  allow ux /usr/bin/pasta,',
                  '  allow ux /usr/bin/pasta.avx2,',
                  '  allow ux /bin/pasta,',
                  '  allow ux /bin/pasta.avx2,',
              ])
              profile = profile.replace('{pasta_rules}', pasta_rules)
              open('/tmp/canister-apparmor-test', 'w').write(profile)
          "

          if [ -f /tmp/canister-apparmor-test ]; then
            echo "--- Generated AppArmor profile ---"
            cat /tmp/canister-apparmor-test
            echo "--- Parsing with apparmor_parser ---"
            # Use -Q (skip kernel load) and -K (skip cache) for parse-only validation.
            if sudo apparmor_parser -QTK /tmp/canister-apparmor-test 2>&1; then
              echo "apparmor_parser: PROFILE VALID"
            else
              echo "::error::AppArmor profile failed to parse"
              exit 1
            fi
          else
            echo "::error::Could not extract profile template"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Build binary for VM integration tests
  # -----------------------------------------------------------------------
  build:
    name: Build (integration artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          rustup show
          rustup target add x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-musl-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-musl-${{ runner.os }}-

      - name: Build static musl binary
        env:
          # Ubuntu's `musl-tools` package ships an unprefixed `musl-gcc`
          # wrapper script — not the prefixed binaries from musl-cross-make.
          # System `ar` produces standard ELF archives that the musl
          # toolchain accepts; we only need a C compiler that links against
          # the musl libc.
          CC_x86_64_unknown_linux_musl: musl-gcc
          AR_x86_64_unknown_linux_musl: ar
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify static linking
        run: |
          file target/x86_64-unknown-linux-musl/release/can
          ldd target/x86_64-unknown-linux-musl/release/can 2>&1 | grep -q "statically linked"

      - name: Package artifact
        run: |
          mkdir -p artifact
          cp target/x86_64-unknown-linux-musl/release/can artifact/
          cp -r tests/integration artifact/
          cp -r recipes artifact/
          tar czf canister-artifact.tar.gz -C artifact .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: canister-artifact
          path: canister-artifact.tar.gz
          retention-days: 1

  # -----------------------------------------------------------------------
  # Integration tests on Fedora VM (SELinux enforcing) via QEMU/KVM
  # -----------------------------------------------------------------------
  integration-fedora-selinux:
    name: Integration (Fedora + SELinux)
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 20
    # KNOWN ISSUE: pasta fails on Fedora 42 cloud images with
    # "netns dir open: Permission denied" before any SELinux denial is
    # logged — see commits f7279c3, a3c1eea. The error persists even
    # with `permissive canister_t;` and the /var/run/netns directory
    # pre-created, which rules out SELinux as the cause. Likely a pasta
    # version / DAC issue on Fedora cloud images that needs hands-on
    # debugging on a real VM. Allow the job to fail without sinking the
    # whole CI run; restore strict gating once the root cause is fixed.
    continue-on-error: true
    env:
      VM_SSH_PORT: 2222
      VM_USER: canister
      FEDORA_IMAGE_URL: "https://download.fedoraproject.org/pub/fedora/linux/releases/42/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-42-1.1.x86_64.qcow2"
      FEDORA_IMAGE: "fedora-cloud.qcow2"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Install QEMU and cloud-image-utils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils cloud-image-utils openssh-client
          sudo chmod 666 /dev/kvm

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: canister-artifact

      - name: Generate SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/vm_key -N "" -q
          cat ~/.ssh/vm_key.pub

      - name: Create cloud-init config
        run: |
          mkdir -p cloud-init
          cat > cloud-init/user-data <<'USERDATA'
          #cloud-config
          users:
            - name: canister
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - SSH_PUBKEY_PLACEHOLDER
          USERDATA

          # Inject the actual SSH public key.
          sed -i "s|SSH_PUBKEY_PLACEHOLDER|$(cat ~/.ssh/vm_key.pub)|" cloud-init/user-data

          cat > cloud-init/meta-data <<'EOF'
          instance-id: canister-ci
          local-hostname: canister-ci
          EOF

          cloud-localds cloud-init/seed.iso cloud-init/user-data cloud-init/meta-data

      - name: Cache Fedora Cloud image
        uses: actions/cache@v4
        with:
          path: ${{ env.FEDORA_IMAGE }}
          key: vm-image-fedora-${{ env.FEDORA_IMAGE_URL }}

      - name: Download Fedora Cloud image
        run: |
          if [ -f "$FEDORA_IMAGE" ]; then
            echo "Using cached image"
            ls -lh "$FEDORA_IMAGE"
          else
            curl -fSL --retry 3 --retry-delay 10 -o "$FEDORA_IMAGE" "$FEDORA_IMAGE_URL"
          fi
          # Create a working copy (CoW overlay) so we don't modify the original.
          qemu-img create -f qcow2 -b "$FEDORA_IMAGE" -F qcow2 fedora-work.qcow2 20G

      - name: Boot Fedora VM
        run: |
          qemu-system-x86_64 \
            -enable-kvm \
            -m 4096 \
            -smp 2 \
            -nographic \
            -drive file=fedora-work.qcow2,if=virtio \
            -drive file=cloud-init/seed.iso,if=virtio,format=raw \
            -netdev user,id=net0,hostfwd=tcp::${VM_SSH_PORT}-:22 \
            -device virtio-net-pci,netdev=net0 \
            -serial mon:stdio \
            &> /tmp/qemu-fedora.log &
          QEMU_PID=$!
          echo "QEMU_PID=$QEMU_PID" >> "$GITHUB_ENV"
          echo "QEMU started with PID $QEMU_PID"

      - name: Wait for SSH
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -i ~/.ssh/vm_key"
          echo "Waiting for VM SSH to become available..."
          for i in $(seq 1 60); do
            if ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost echo "SSH ready" 2>/dev/null; then
              echo "VM is ready after ~${i}x5 seconds"
              exit 0
            fi
            sleep 5
          done
          echo "::error::VM did not become SSH-ready within 5 minutes"
          echo "--- QEMU log (last 100 lines) ---"
          tail -100 /tmp/qemu-fedora.log
          exit 1

      - name: Copy artifacts to VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SCP="scp $SSH_OPTS -P $VM_SSH_PORT"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          # Copy the artifact tarball.
          $SCP canister-artifact.tar.gz $VM_USER@localhost:~/

          # Unpack into the expected directory structure for lib.sh.
          $SSH <<'REMOTE'
          set -euo pipefail
          mkdir -p ~/canister/target/release ~/canister/tests /tmp/canister-unpack
          tar xzf ~/canister-artifact.tar.gz -C /tmp/canister-unpack
          cp /tmp/canister-unpack/can ~/canister/target/release/can
          chmod +x ~/canister/target/release/can
          cp -r /tmp/canister-unpack/integration ~/canister/tests/integration
          chmod +x ~/canister/tests/integration/*.sh
          cp -r /tmp/canister-unpack/recipes ~/canister/recipes
          # Install recipes into the XDG-discoverable location so `can run
          # -r <name>` resolves them. `baseline_search_dirs()` looks at
          # $XDG_CONFIG_HOME/canister/recipes (default ~/.config/...) but
          # does NOT scan ~/canister/recipes/.
          mkdir -p ~/.config/canister
          cp -r ~/canister/recipes ~/.config/canister/recipes
          echo "--- Artifact layout ---"
          find ~/canister -type f | head -40
          REMOTE

      - name: Install dependencies in VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          sudo dnf install -y git passt selinux-policy-devel policycoreutils python3
          # pasta unconditionally opens /var/run/netns at startup. On bare
          # Fedora cloud images that dir does not exist (it's created by the
          # `ip netns` tooling on first use). Pre-create it world-readable
          # so unprivileged pasta invocations succeed.
          sudo mkdir -p /var/run/netns
          sudo chmod 755 /var/run/netns
          echo "--- Environment ---"
          uname -a
          getenforce
          sestatus
          pasta --version 2>/dev/null || echo "pasta version check failed"
          cat /proc/sys/user/max_user_namespaces 2>/dev/null || true
          unshare --user true && echo "unshare --user works" || echo "unshare --user FAILED"
          REMOTE

      - name: Install MAC policy in VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          # Smoke test the binary first.
          ~/canister/target/release/can check

          # Install SELinux policy (non-interactive: not a TTY).
          sudo ~/canister/target/release/can setup --force 2>&1
          echo "--- SELinux policy installed ---"

          # Debug: check what the build produced and module store state.
          echo "--- Policy build artifacts ---"
          ls -la /tmp/canister-selinux/ 2>/dev/null || echo "/tmp/canister-selinux not found"
          echo "--- semodule -lfull (all modules) | grep -i can ---"
          sudo semodule -lfull 2>&1 | grep -i can || echo "(none)"
          echo "--- Module store ---"
          ls /var/lib/selinux/targeted/active/modules/400/ 2>/dev/null | head -20 || echo "no priority-400 store"
          ls /var/lib/selinux/targeted/active/modules/100/ 2>/dev/null | grep -i can || echo "no canister in priority-100"

          # Verify sandbox works after policy install.
          ~/canister/target/release/can run -- echo "sandbox works after SELinux policy install"
          REMOTE

      - name: Run integration tests in VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          cd ~/canister
          ./tests/integration/run.sh
          REMOTE

      - name: Run SELinux MAC tests explicitly
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          cd ~/canister
          bash ./tests/integration/t_selinux.sh
          REMOTE

      - name: Shutdown VM
        if: always()
        run: |
          if [ -n "${QEMU_PID:-}" ]; then
            kill "$QEMU_PID" 2>/dev/null || true
          fi

      - name: Upload QEMU log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-fedora-log
          path: /tmp/qemu-fedora.log
          retention-days: 3

  # -----------------------------------------------------------------------
  # Integration tests on Ubuntu VM (AppArmor enforcing) via QEMU/KVM
  # -----------------------------------------------------------------------
  integration-ubuntu-apparmor:
    name: Integration (Ubuntu + AppArmor)
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 20
    env:
      VM_SSH_PORT: 2222
      VM_USER: canister
      UBUNTU_IMAGE_URL: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
      UBUNTU_IMAGE: "ubuntu-cloud.img"
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Install QEMU and cloud-image-utils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils cloud-image-utils openssh-client
          sudo chmod 666 /dev/kvm

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: canister-artifact

      - name: Generate SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/vm_key -N "" -q
          cat ~/.ssh/vm_key.pub

      - name: Create cloud-init config
        run: |
          mkdir -p cloud-init
          cat > cloud-init/user-data <<'USERDATA'
          #cloud-config
          users:
            - name: canister
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - SSH_PUBKEY_PLACEHOLDER
          USERDATA

          # Inject the actual SSH public key.
          sed -i "s|SSH_PUBKEY_PLACEHOLDER|$(cat ~/.ssh/vm_key.pub)|" cloud-init/user-data

          cat > cloud-init/meta-data <<'EOF'
          instance-id: canister-ci
          local-hostname: canister-ci
          EOF

          cloud-localds cloud-init/seed.iso cloud-init/user-data cloud-init/meta-data

      - name: Cache Ubuntu Cloud image
        uses: actions/cache@v4
        with:
          path: ${{ env.UBUNTU_IMAGE }}
          key: vm-image-ubuntu-${{ env.UBUNTU_IMAGE_URL }}

      - name: Download Ubuntu Cloud image
        run: |
          if [ -f "$UBUNTU_IMAGE" ]; then
            echo "Using cached image"
            ls -lh "$UBUNTU_IMAGE"
          else
            curl -fSL --retry 3 --retry-delay 10 -o "$UBUNTU_IMAGE" "$UBUNTU_IMAGE_URL"
          fi
          # Create a working copy (CoW overlay) so we don't modify the original.
          qemu-img create -f qcow2 -b "$UBUNTU_IMAGE" -F qcow2 ubuntu-work.qcow2 20G

      - name: Boot Ubuntu VM
        run: |
          qemu-system-x86_64 \
            -enable-kvm \
            -m 4096 \
            -smp 2 \
            -nographic \
            -drive file=ubuntu-work.qcow2,if=virtio \
            -drive file=cloud-init/seed.iso,if=virtio,format=raw \
            -netdev user,id=net0,hostfwd=tcp::${VM_SSH_PORT}-:22 \
            -device virtio-net-pci,netdev=net0 \
            -serial mon:stdio \
            &> /tmp/qemu-ubuntu.log &
          QEMU_PID=$!
          echo "QEMU_PID=$QEMU_PID" >> "$GITHUB_ENV"
          echo "QEMU started with PID $QEMU_PID"

      - name: Wait for SSH
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -i ~/.ssh/vm_key"
          echo "Waiting for VM SSH to become available..."
          for i in $(seq 1 60); do
            if ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost echo "SSH ready" 2>/dev/null; then
              echo "VM is ready after ~${i}x5 seconds"
              exit 0
            fi
            sleep 5
          done
          echo "::error::VM did not become SSH-ready within 5 minutes"
          echo "--- QEMU log (last 100 lines) ---"
          tail -100 /tmp/qemu-ubuntu.log
          exit 1

      - name: Copy artifacts to VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SCP="scp $SSH_OPTS -P $VM_SSH_PORT"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          # Copy the artifact tarball.
          $SCP canister-artifact.tar.gz $VM_USER@localhost:~/

          # Unpack into the expected directory structure for lib.sh.
          $SSH <<'REMOTE'
          set -euo pipefail
          mkdir -p ~/canister/target/release ~/canister/tests /tmp/canister-unpack
          tar xzf ~/canister-artifact.tar.gz -C /tmp/canister-unpack
          cp /tmp/canister-unpack/can ~/canister/target/release/can
          chmod +x ~/canister/target/release/can
          cp -r /tmp/canister-unpack/integration ~/canister/tests/integration
          chmod +x ~/canister/tests/integration/*.sh
          cp -r /tmp/canister-unpack/recipes ~/canister/recipes
          # Install recipes into the XDG-discoverable location so `can run
          # -r <name>` resolves them. `baseline_search_dirs()` looks at
          # $XDG_CONFIG_HOME/canister/recipes (default ~/.config/...) but
          # does NOT scan ~/canister/recipes/.
          mkdir -p ~/.config/canister
          cp -r ~/canister/recipes ~/.config/canister/recipes
          echo "--- Artifact layout ---"
          find ~/canister -type f | head -40
          REMOTE

      - name: Install dependencies in VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq git passt apparmor-utils python3
          echo "--- Environment ---"
          uname -a
          cat /sys/module/apparmor/parameters/enabled
          sudo aa-status --verbose 2>/dev/null || true
          pasta --version 2>/dev/null || echo "pasta version check failed"
          cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo "userns restriction sysctl not found"
          unshare --user true && echo "unshare --user works" || echo "unshare --user FAILED"
          REMOTE

      - name: Relax AppArmor userns restriction
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          # Ubuntu 24.04+ restricts unprivileged user namespaces via AppArmor.
          # Relax this so the sandbox can create namespaces, then install our
          # AppArmor profile which explicitly grants the permission.
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo "Relaxing AppArmor userns restriction for integration tests..."
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          REMOTE

      - name: Install MAC policy in VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          # Smoke test the binary first.
          ~/canister/target/release/can check

          # Install AppArmor profile (non-interactive: not a TTY).
          sudo ~/canister/target/release/can setup --force 2>&1
          echo "--- AppArmor policy installed ---"
          sudo aa-status 2>/dev/null | grep -i canister || echo "canister profile not visible in aa-status"

          # Verify sandbox works after policy install.
          ~/canister/target/release/can run -- echo "sandbox works after AppArmor policy install"
          REMOTE

      - name: Run integration tests in VM
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          cd ~/canister
          ./tests/integration/run.sh
          REMOTE

      - name: Run AppArmor MAC tests explicitly
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/vm_key"
          SSH="ssh $SSH_OPTS -p $VM_SSH_PORT $VM_USER@localhost"

          $SSH <<'REMOTE'
          set -euo pipefail
          cd ~/canister
          bash ./tests/integration/t_apparmor.sh
          REMOTE

      - name: Shutdown VM
        if: always()
        run: |
          if [ -n "${QEMU_PID:-}" ]; then
            kill "$QEMU_PID" 2>/dev/null || true
          fi

      - name: Upload QEMU log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-ubuntu-log
          path: /tmp/qemu-ubuntu.log
          retention-days: 3

  # -----------------------------------------------------------------------
  # Publish latest release on every push to main
  # -----------------------------------------------------------------------
  latest-release:
    name: Update latest release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # integration-fedora-selinux is intentionally NOT a gate (known issue;
    # see continue-on-error annotation on that job). Re-add once fixed.
    needs: [check, test, build, integration-ubuntu-apparmor]
    # Job-level escalation only — the rest of the workflow runs with the
    # top-level `contents: read`. The release job needs write access to
    # publish artifacts under `latest`.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: canister-artifact

      - name: Package release binary
        run: |
          mkdir -p release-staging
          tar xzf canister-artifact.tar.gz -C release-staging
          cp release-staging/can .
          tar czf canister-x86_64-linux.tar.gz can
          sha256sum canister-x86_64-linux.tar.gz > canister-x86_64-linux.tar.gz.sha256

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing latest release if it exists.
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Create new latest release.
          gh release create latest \
            canister-x86_64-linux.tar.gz \
            canister-x86_64-linux.tar.gz.sha256 \
            --title "Latest (unstable)" \
            --notes "Built from \`main\` at $(date -u +%Y-%m-%d) — commit ${GITHUB_SHA:0:7}.

          This is an automatically updated pre-release from the latest \`main\` branch.
          For stable releases, see tagged versions (\`v*\`)." \
            --prerelease
