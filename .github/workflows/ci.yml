name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: check-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-

      - name: Unit tests
        run: cargo test --workspace

      - name: Install passt
        run: sudo apt-get update && sudo apt-get install -y passt

      - name: Check sandbox support
        id: sandbox-check
        run: |
          cargo build --workspace --quiet
          if ./target/debug/can run -- true 2>/dev/null; then
            echo "sandbox=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Sandbox not functional on this runner (likely restricted namespaces) — skipping integration tests"
            echo "sandbox=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration tests
        if: steps.sandbox-check.outputs.sandbox == 'true'
        run: ./tests/integration/run.sh

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        run: |
          rustup toolchain install 1.85 --profile minimal
          rustup default 1.85

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: msrv-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: msrv-${{ runner.os }}-

      - name: Check MSRV
        run: cargo check --workspace

  selinux-compile-test:
    name: SELinux Policy Compile Test
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v4

      - name: Install SELinux tools
        run: dnf install -y checkpolicy policycoreutils selinux-policy-devel

      - name: Install Rust toolchain
        run: |
          dnf install -y gcc curl
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: selinux-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: selinux-${{ runner.os }}-

      - name: Build canister
        run: |
          source "$HOME/.cargo/env"
          cargo build --workspace --quiet

      - name: Generate and compile SELinux policy
        run: |
          source "$HOME/.cargo/env"
          BIN_PATH=$(realpath target/debug/can)

          # Use cargo test to verify SELinux module unit tests compile.
          cargo test -p can-sandbox -- mac::selinux --quiet

          # Generate policy files using the binary's built-in templates.
          # We extract them by running a small Rust snippet.
          mkdir -p /tmp/selinux-test
          cat > /tmp/selinux-test/gen.rs << 'GENEOF'
          fn main() {
              // Inline the template generation logic to test compilation.
              let bin_path = "/usr/bin/can";
              let te = include_str!(concat!(env!("CARGO_MANIFEST_DIR"), "/src/mac/selinux.rs"));
              // Just verify the module compiles — the real test is checkmodule below.
              println!("SELinux module source loaded ({} bytes)", te.len());
          }
          GENEOF

          # Write policy files directly from the templates embedded in the source.
          # Extract TE_TEMPLATE content between the markers.
          python3 -c "
          import re, sys
          src = open('crates/can-sandbox/src/mac/selinux.rs').read()
          # Extract TE template
          te_match = re.search(r'const TE_TEMPLATE:.*?= r#\"(.*?)\"#;', src, re.DOTALL)
          fc_match = re.search(r'const FC_TEMPLATE:.*?= r#\"(.*?)\"#;', src, re.DOTALL)
          if te_match:
              te = te_match.group(1).replace('{bin_path}', '$BIN_PATH')
              open('/tmp/selinux-test/canister.te', 'w').write(te)
          if fc_match:
              fc = fc_match.group(1).replace('{bin_path}', '$BIN_PATH'.replace('.', r'\.'))
              open('/tmp/selinux-test/canister.fc', 'w').write(fc)
          " || true

          # If python extraction worked, try to compile.
          if [ -f /tmp/selinux-test/canister.te ]; then
            echo "--- Generated TE policy ---"
            head -20 /tmp/selinux-test/canister.te
            echo "..."
            echo "--- Compiling with checkmodule ---"
            # Note: This may fail because our policy uses reference policy macros
            # (domain_type, domain_entry_file, etc.) which require the full
            # selinux-policy-devel build infrastructure. We test what we can.
            if checkmodule -M -m -o /tmp/selinux-test/canister.mod /tmp/selinux-test/canister.te 2>&1; then
              echo "checkmodule: SUCCESS"
              semodule_package -o /tmp/selinux-test/canister.pp -m /tmp/selinux-test/canister.mod 2>&1 || true
              echo "Policy package created successfully"
            else
              echo "::warning::checkmodule failed (expected — policy uses reference policy macros that require make-based build)"
              echo "Unit tests passed; full policy compilation requires 'make -f /usr/share/selinux/devel/Makefile'"
              # Try the reference policy build system instead.
              cp /tmp/selinux-test/canister.te /tmp/selinux-test/canister.fc .
              touch canister.if
              if make -f /usr/share/selinux/devel/Makefile canister.pp 2>&1; then
                echo "Reference policy build: SUCCESS"
              else
                echo "::warning::Reference policy build also failed — policy may need adjustments for this Fedora version"
              fi
            fi
          else
            echo "::warning::Could not extract policy templates — skipping compile test"
          fi

  apparmor-compile-test:
    name: AppArmor Profile Compile Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: apparmor-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: apparmor-${{ runner.os }}-

      - name: Build and run AppArmor unit tests
        run: cargo test -p can-sandbox -- mac::apparmor --quiet

      - name: Generate and verify AppArmor profile
        run: |
          cargo build --workspace --quiet
          BIN_PATH=$(realpath target/debug/can)

          # Extract and generate the AppArmor profile.
          python3 -c "
          import re
          src = open('crates/can-sandbox/src/mac/apparmor.rs').read()
          match = re.search(r'const PROFILE_TEMPLATE:.*?= r#\"(.*?)\"#;', src, re.DOTALL)
          if match:
              profile = match.group(1).replace('{bin_path}', '$BIN_PATH')
              open('/tmp/canister-apparmor-test', 'w').write(profile)
          "

          if [ -f /tmp/canister-apparmor-test ]; then
            echo "--- Generated AppArmor profile ---"
            cat /tmp/canister-apparmor-test
            echo "--- Parsing with apparmor_parser ---"
            # Use -Q (skip kernel load) and -K (skip cache) for parse-only validation.
            if sudo apparmor_parser -QTK /tmp/canister-apparmor-test 2>&1; then
              echo "apparmor_parser: PROFILE VALID"
            else
              echo "::error::AppArmor profile failed to parse"
              exit 1
            fi
          else
            echo "::error::Could not extract profile template"
            exit 1
          fi
