name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MISE_YES: 1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        run: curl https://mise.run | sh

      - name: Setup toolchain
        run: mise install

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ runner.os }}-

      - name: Build
        run: cargo build --release --package can-cli

      - name: Package
        run: |
          cd target/release
          tar czf ../../canister-x86_64-unknown-linux-gnu.tar.gz can
          cd ../..
          sha256sum canister-x86_64-unknown-linux-gnu.tar.gz > canister-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: canister-x86_64-unknown-linux-gnu
          path: |
            canister-x86_64-unknown-linux-gnu.tar.gz
            canister-x86_64-unknown-linux-gnu.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/canister-* --generate-notes
