name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-musl-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-musl-${{ runner.os }}-

      - name: Build static musl binary
        run: cargo build --release --target x86_64-unknown-linux-musl --package can-cli

      - name: Verify static linking
        run: |
          file target/x86_64-unknown-linux-musl/release/can
          ldd target/x86_64-unknown-linux-musl/release/can 2>&1 | grep -q "statically linked"

      - name: Package
        run: |
          cp target/x86_64-unknown-linux-musl/release/can .
          tar czf canister-x86_64-linux.tar.gz can
          sha256sum canister-x86_64-linux.tar.gz > canister-x86_64-linux.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: canister-x86_64-linux
          path: |
            canister-x86_64-linux.tar.gz
            canister-x86_64-linux.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/canister-* --generate-notes
